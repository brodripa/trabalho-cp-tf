name: 'Terraform CI/CD'

on:
  push:
    branches: [ "main" ] # Dispara o CD quando algo entra na main
  pull_request:
    branches: [ "main" ] # Dispara o CI quando um Pull Request é aberto

jobs:
  terraform:
    name: 'Terraform Pipeline'
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout do código
    - name: Checkout Código
      uses: actions/checkout@v3

    # 2. Instalação do Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: "1.5.0"

    # 3. Inicialização dos Módulos
    - name: Terraform Init
      run: terraform init

    # 4. Validação do código
    - name: Terraform Validate
      run: terraform validate

    # 5. Planejamento (Roda tanto no PR quanto na Main)
    - name: Terraform Plan
      run: terraform plan -no-color
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: "us-east-1"

    # 6. IMPLANTAÇÃO CONTÍNUA (CD)
    # Este passo tem uma condição (if): só roda se for um PUSH na branch MAIN
    - name: Terraform Apply (CD)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve -no-color
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: "us-east-1"
