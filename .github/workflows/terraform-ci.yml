name: 'Terraform CI'

# Define quando a action vai rodar: a cada push na branch main ou pull request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  terraform:
    name: 'Terraform Plan & Validate'
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do seu repositório para a máquina do GitHub
    - name: Checkout do código
      uses: actions/checkout@v3

    # 2. Instala o Terraform na máquina do GitHub
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: "1.5.0"

    # 3. Inicializa o Terraform (baixa os provedores da AWS)
    - name: Terraform Init
      run: terraform init

    # 4. Verifica se o código está formatado corretamente
    - name: Terraform Format
      run: terraform fmt -check
      continue-on-error: true

    # 5. Valida a sintaxe do código
    - name: Terraform Validate
      run: terraform validate

    # 6. Cria o plano de execução (mostra o que vai ser criado)
    - name: Terraform Plan
      run: terraform plan -no-color